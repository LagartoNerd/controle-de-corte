workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      node: 18.20.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Set SDK path
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
      - name: Download gradle wrapper jar
        script: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
      - name: Build APK
        script: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
