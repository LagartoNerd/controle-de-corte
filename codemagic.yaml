workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      node: 18.20.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Set SDK path
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
      - name: Download gradle wrapper jar
        script: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
      - name: Bundle JavaScript
        script: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
      - name: Build APK
        script: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
