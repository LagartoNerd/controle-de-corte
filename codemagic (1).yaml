workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      node: 18.20.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Set SDK path
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
      - name: Fix gradlew permission
        script: chmod +x android/gradlew
      - name: Build APK
        script: cd android && ./gradlew assembleDebug --no-daemon
    artifacts:
      - android/app/build/outputs/apk/debug/app-debug.apk
